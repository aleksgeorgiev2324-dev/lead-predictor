<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeadPredictor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="dashboard" aria-label="Lead prediction calculator">
        <aside class="settings-panel" aria-label="Calculator inputs">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M4.25 5.5A2.25 2.25 0 0 1 6.5 3.25h11a2.25 2.25 0 0 1 2.25 2.25v2.14c0 .56-.2 1.1-.57 1.53l-4.86 5.57a2.3 2.3 0 0 0-.57 1.5v2.01c0 .5-.27.96-.71 1.2l-3.3 1.79a1.1 1.1 0 0 1-1.63-.97v-4.03c0-.55-.2-1.09-.56-1.5L2.69 9.17a2.34 2.34 0 0 1-.56-1.53V5.5Z" />
              </svg>
            </span>
            <h1 id="app-title">LeadPredictor</h1>
          </div>

          <form id="calculator-form" class="control-stack">
            <label class="field">
              <span data-i18n="language">Language</span>
              <select id="language">
                <option value="en">English</option>
                <option value="bg">Bulgarian</option>
              </select>
            </label>

            <label class="field">
              <span data-i18n="currency">Currency</span>
              <select id="currency">
                <option value="USD">$ US Dollar</option>
                <option value="EUR">EUR Euro</option>
                <option value="BGN">BGN Lev</option>
              </select>
            </label>

            <label class="field">
              <span data-i18n="campaignStart">Campaign Start</span>
              <input id="campaign-start" type="date" value="2026-05-08" />
            </label>

            <label class="field">
              <span data-i18n="campaignEnd">Campaign End</span>
              <input id="campaign-end" type="date" value="2026-11-04" />
            </label>

            <label class="field">
              <span data-i18n="totalRevenue">Total Revenue</span>
              <span class="money-input">
                <span class="currency-prefix" data-currency-prefix>$</span>
                <input id="total-revenue" type="number" inputmode="decimal" min="0" step="100" value="10000" />
              </span>
            </label>

            <label class="field">
              <span data-i18n="avgOrderValue">Avg. Order Value</span>
              <span class="money-input">
                <span class="currency-prefix" data-currency-prefix>$</span>
                <input id="avg-order" type="number" inputmode="decimal" min="1" step="50" value="1000" />
              </span>
            </label>
          </form>
        </aside>

        <section class="workspace" aria-label="Prediction results">
          <div class="top-grid">
            <section class="chart-panel" aria-labelledby="chart-title">
              <div class="chart-copy">
                <p id="chart-title" data-i18n="monthlyPlan">Monthly contacts plan</p>
                <p id="campaign-summary">08 May 2026 - 04 Nov 2026</p>
              </div>
              <div class="chart-wrap">
                <div class="axis-label" data-i18n="month">Month</div>
                <div class="bar-chart" id="bar-chart" aria-live="polite"></div>
                <div class="x-axis" id="x-axis">
                  <span>0</span>
                  <span>20</span>
                  <span>40</span>
                  <span>60</span>
                  <span>80</span>
                  <span>100</span>
                  <span>120</span>
                </div>
              </div>
            </section>

            <section class="metrics-stack" aria-label="Calculated funnel">
              <article class="metric-card" data-metric="prospects">
                <div class="metric-head">
                  <span class="metric-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v13A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5v-13Zm4 2h8v1.8H8V7.5Zm0 4h8v1.8H8v-1.8Zm0 4h5v1.8H8v-1.8Z" /></svg>
                  </span>
                  <h2 data-i18n="prospects">Prospects</h2>
                  <strong id="prospect-percent">100%</strong>
                </div>
                <p id="prospect-count">125</p>
                <div class="progress-track"><span id="prospect-bar"></span></div>
              </article>

              <article class="metric-card" data-metric="leads">
                <div class="metric-head">
                  <span class="metric-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M12 12.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Zm-7.4 7.1c.7-3.4 3.7-5.7 7.4-5.7s6.7 2.3 7.4 5.7c.2.9-.5 1.7-1.4 1.7H6c-.9 0-1.6-.8-1.4-1.7Z" /></svg>
                  </span>
                  <h2 data-i18n="leads">Leads</h2>
                  <strong id="lead-percent">20%</strong>
                </div>
                <p id="lead-count">25</p>
                <div class="progress-track"><span id="lead-bar"></span></div>
              </article>

              <article class="metric-card" data-metric="customers">
                <div class="metric-head">
                  <span class="metric-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M12 3.25 20 6.7v5.1c0 5.1-3.4 8.7-8 9.95-4.6-1.25-8-4.85-8-9.95V6.7l8-3.45Zm3.7 6.75-4.8 4.8-2.3-2.3-1.35 1.35 3.65 3.65 6.15-6.15L15.7 10Z" /></svg>
                  </span>
                  <h2 data-i18n="customers">Customers</h2>
                  <strong id="customer-percent">8%</strong>
                </div>
                <p id="customer-count">10</p>
                <div class="progress-track"><span id="customer-bar"></span></div>
              </article>
            </section>
          </div>

          <section class="slider-panel" aria-label="Conversion rates">
            <label class="range-field">
              <span data-i18n="leadResponseRate">Lead Response Rate</span>
              <output id="lead-rate-output" for="lead-rate">40.00%</output>
              <input id="lead-rate" type="range" min="1" max="100" value="40" />
            </label>

            <label class="range-field">
              <span data-i18n="prospectResponseRate">Prospect Response Rate</span>
              <output id="prospect-rate-output" for="prospect-rate">20.00%</output>
              <input id="prospect-rate" type="range" min="1" max="100" value="20" />
            </label>
          </section>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
